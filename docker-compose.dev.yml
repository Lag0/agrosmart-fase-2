services:
  web:
    ports:
      - "3000:3000"
    volumes:
      - ./web:/app
      - data:/data
    command: ["bun", "run", "dev"]
    networks:
      - internal
      - public_net

  api:
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app
      - data:/data
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload", "--reload-dir", "/app/app"]
    networks:
      - internal

networks:
  internal:
    # Remove internal constraint in dev so ports are accessible locally
  public_net: {}
