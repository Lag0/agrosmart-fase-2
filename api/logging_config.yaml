version: 1
disable_existing_loggers: false
formatters:
  json:
    class: pythonjsonlogger.json.JsonFormatter
    format: "%(asctime)s %(levelname)s %(name)s %(message)s"
    datefmt: "%Y-%m-%dT%H:%M:%S.%fZ"
handlers:
  console:
    class: logging.StreamHandler
    formatter: json
    stream: ext://sys.stdout
loggers:
  uvicorn.access:
    level: INFO
    handlers: [console]
    propagate: false
  uvicorn.error:
    level: INFO
    handlers: [console]
    propagate: false
  agrosmart:
    level: INFO
    handlers: [console]
    propagate: false
root:
  level: WARNING
  handlers: [console]
